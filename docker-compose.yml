version: "3.8"

services:
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      - MH_API_BIND_ADDR=0.0.0.0:8025
      - MH_SMTP_BIND_ADDR=0.0.0.0:1025
    restart: unless-stopped

  mailhog-imap:
    image: djmaze/mailhog:latest
    ports:
      - "1143:1143"   # IMAP
    environment:
      - MH_IMAP_BIND_ADDR=0.0.0.0:1143
    restart: unless-stopped

  email-worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - mailhog
    environment:
      - IMAP_HOST=mailhog
      - IMAP_PORT=1143
      - IMAP_USER=testuser
      - IMAP_PASSWORD=testpass
      - IMAP_POLL_INTERVAL_SECONDS=10
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_USER=
      - SMTP_PASSWORD=
      - EMAIL_FROM_ADDRESS=helpdesk@sps.com
      - EMAIL_FROM_NAME=SPS Helpdesk
      - BACKEND_API_URL=http://backend:8000
      - AI_SERVICE_URL=http://ai_service:8001
      - PORTAL_URL=http://localhost:5173
    restart: unless-stopped