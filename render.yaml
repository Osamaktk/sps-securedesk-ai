# SPS SecureDesk AI — Render Deployment Configuration
# https://render.com/docs/infrastructure-as-code

services:
  # AI Service
  - type: web
    name: sps-securedesk-ai
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r ai/requirements.txt
    startCommand: uvicorn ai.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: BACKEND_URL
        value: http://sps-securedesk-ai-backend:10000
      - key: CORS_ORIGINS
        value: https://sps-securedesk-frontend.onrender.com

  # Email Worker (IMAP/SMTP background pipeline)
  - type: worker
    name: sps-securedesk-email-worker
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r email_worker/requirements.txt
    startCommand: python -m email_worker.main
    envVars:
      - key: IMAP_HOST
        sync: false
      - key: IMAP_PORT
        value: 993
      - key: IMAP_USER
        sync: false
      - key: IMAP_PASSWORD
        sync: false
      - key: IMAP_POLL_INTERVAL_SECONDS
        value: 30
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: EMAIL_FROM_NAME
        value: SPS Helpdesk
      - key: BACKEND_API_URL
        value: http://sps-securedesk-ai-backend:10000
      - key: AI_SERVICE_URL
        value: http://sps-securedesk-ai:10000
      - key: INTERNAL_API_KEY
        sync: false
      - key: PORTAL_URL
        value: https://sps-securedesk-frontend.onrender.com